<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gantry</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="steps" class="buffer" aria-label="Gantry markdown editor"></main>

    <footer class="statusbar" aria-label="Gantry gate">
      <form id="slug-form" class="path-form">
        <span class="dir">.gantry/</span>
        <input id="slug-input" name="slug" placeholder="slug" autocomplete="off" />
        <span class="ext">.md</span>
      </form>

      <span id="status" class="status"></span>
      <span class="spring"></span>

      <div class="gate">
        <div class="meter" aria-hidden="true"><span id="gate-fill"></span></div>
        <span id="gate-label">0 open</span>
      </div>

      <button id="lint-button" type="button">Gate</button>
      <button id="save-button" type="button">Save</button>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
